# Use postgres/example user/password credentials
# mvn clean package spring-boot:repackage
# docker compose up -d
# docker build -t image .

services:

  db:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    volumes:
     - ./resources2/:/docker-entrypoint-initdb.d

    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB: appdb
      POSTGRES_USER: admin 
      DB_USER: app_user
      DB_PASSWORD: myappwd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports: 
      - 5432:5432
  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080

  my-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      - DB_PASSWORD=myappwd
      - DB_USER=app_user
      - DB_HOST=db
      - DB_NAME=appdb
      - DB_PORT=5432

  sonar:
    image: sonarqube:10.3-community
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ports:
      - 9000:9000
    networks:
      - sonar
    
  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yml"
    ports:
      - 4040:4040
    volumes:
    - ./ngrok.yml:/etc/ngrok.yml
    networks:
      - sonar

networks:
  sonar:

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: